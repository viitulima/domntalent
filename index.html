
<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>DOMN TALENT</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
  font-family:'Orbitron', sans-serif;
  text-align:center;
  color:white;
  margin:0;
  background:url("https://i.pinimg.com/1200x/57/2a/27/572a275aaa2ce87df412de827720aacf.jpg") no-repeat center center fixed;
  background-size: cover;
  position: relative;
  overflow-x: hidden;
}

/* Camada desfocada do fundo */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: url("https://i.pinimg.com/1200x/57/2a/27/572a275aaa2ce87df412de827720aacf.jpg") no-repeat center center fixed;
  background-size: cover;
  filter: blur(6px) brightness(0.4); /* desfoque menor */
  z-index: -1;
}

/* TITULO COM ANIMAÇÃO DE COR AZUL */
h1{
  font-size:48px;
  margin-top:30px;
  background: linear-gradient(90deg,#00e1ff,#0099ff,#00c896,#00e1ff);
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: brilho 4s linear infinite;
}

@keyframes brilho{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.produtos{
display:flex;
justify-content:center;
gap:35px;
padding:50px;
flex-wrap:wrap;
}

.produto{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:22px;
border-radius:14px;
width:230px;
transition:0.35s;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 8px 25px rgba(0,0,0,0.6);
}

.produto:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 25px #00c896;
}

.produto img{
width:100%;
height:130px;
object-fit:cover;
border-radius:8px;
margin-bottom:10px;
}

.produto h3{
font-size:16px;
margin:8px 0;
}

.produto p{
font-size:20px;
color:#00e1ff;
margin:8px 0;
}

button{
padding:10px 20px;
border:none;
background:linear-gradient(90deg,#00c896,#00e1ff);
color:white;
cursor:pointer;
border-radius:8px;
margin-top:10px;
font-weight:bold;
transition:0.25s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 12px #00e1ff;
}

#carrinho{
max-width:650px;
margin:auto;
margin-top:20px;
background:rgba(0,0,0,0.5);
padding:25px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

#carrinho h2{
margin-bottom:15px;
color:#00e1ff;
}

.itemCarrinho{
display:flex;
justify-content:space-between;
align-items:center;
margin:12px 0;
border-bottom:1px solid #333;
padding-bottom:8px;
font-size:14px;
}

.controles button{
padding:4px 8px;
font-size:12px;
margin:0 2px;
}

.remover{
background:#ff3b3b;
}

#carrinho h3{
margin-top:18px;
color:#00e1ff;
}

#areaPagamento{
display:none;
margin-top:40px;
padding-bottom:40px;
}

#areaPagamento h2{
color:#00e1ff;
}

#qrcode{
margin-top:20px;
display:flex;
justify-content:center;
}

textarea{
margin-top:20px;
border-radius:8px;
border:none;
padding:12px;
background:#111;
color:#00e1ff;
width:80%;
max-width:600px;
font-family:monospace;
}

</style>

</head>

<body>

<h1>DOMN TALENT</h1>

<div class="produtos">

<div class="produto">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRF12uI2ooE7VsWBZSc-D76GZA4b1LkDzOItw&s">
<h3>Foto na tiger</h3>
<p>R$1,00</p>
<button onclick="addCarrinho('Foto na tiger',1,00)">Comprar</button>
</div>

<div class="produto">
<img src="https://fiverr-res.cloudinary.com/t_main1,q_auto,f_auto/gigs2/424567809/original/a0fe4d3f8922c9ecbe2cc29b7007ae2eb7227e76.jpg">
<h3>Servidor pronto Discord</h3>
<p>R$15,00</p>
<button onclick="addCarrinho('Servidor Discord',15)">Comprar</button>
</div>

</div>

<div id="carrinho">

<h2>Carrinho</h2>

<div id="listaCarrinho"></div>

<h3>Total: R$ <span id="total">0,00</span></h3>

<button onclick="gerarPix()">Finalizar Compra</button>

</div>

<div id="areaPagamento">

<h2>Pagar com PIX</h2>

<div id="qrcode"></div>

<br>

<textarea id="pixcode" rows="5" readonly></textarea>

</div>

<script>

let carrinho = []
let total = 0

function addCarrinho(nome,valor){

let item = carrinho.find(p => p.nome === nome)

if(item){
item.qtd++
}else{
carrinho.push({nome:nome,valor:valor,qtd:1})
}

renderCarrinho()

}

function aumentar(nome){
let item = carrinho.find(p => p.nome === nome)
item.qtd++
renderCarrinho()
}

function diminuir(nome){
let item = carrinho.find(p => p.nome === nome)

if(item.qtd > 1){
item.qtd--
}else{
carrinho = carrinho.filter(p => p.nome !== nome)
}

renderCarrinho()
}

function removerItem(nome){
carrinho = carrinho.filter(p => p.nome !== nome)
renderCarrinho()
}

function renderCarrinho(){

let lista = document.getElementById("listaCarrinho")
lista.innerHTML=""

total = 0

carrinho.forEach(item=>{

let subtotal = item.valor * item.qtd
total += subtotal

let div = document.createElement("div")
div.className="itemCarrinho"

div.innerHTML = `
<span>
${item.nome}<br>
Qtd: ${item.qtd} | R$${subtotal.toLocaleString("pt-BR",{minimumFractionDigits:2})}
</span>

<div class="controles">
<button onclick="aumentar('${item.nome}')">+</button>
<button onclick="diminuir('${item.nome}')">-</button>
<button class="remover" onclick="removerItem('${item.nome}')">X</button>
</div>
`

lista.appendChild(div)

})

document.getElementById("total").innerText =
total.toLocaleString("pt-BR",{minimumFractionDigits:2})

}

/* PIX */

function pad(n){
return String(n).padStart(2,'0')
}

function campo(id,v){
return id + pad(v.length) + v
}

function crc16(s){

let crc=0xFFFF

for(let c=0;c<s.length;c++){

crc ^= s.charCodeAt(c)<<8

for(let i=0;i<8;i++){

if(crc & 0x8000){
crc=(crc<<1)^0x1021
}else{
crc=(crc<<1)
}

crc &= 0xFFFF

}

}

return crc.toString(16).toUpperCase().padStart(4,'0')

}

function gerarPix(){

if(total <= 0){
alert("Carrinho vazio")
return
}

document.getElementById("areaPagamento").style.display="block"

let chave = "loksilver7@gmail.com"
let nome = "Arthur da Nobrega Barbosa"
let cidade = "SAOPAULO"

let valor = total.toFixed(2)

let gui = campo("00","BR.GOV.BCB.PIX")
let chavePix = campo("01",chave)

let merchant = campo("26", gui + chavePix)

let payload =
campo("00","01") +
merchant +
campo("52","0000") +
campo("53","986") +
campo("54",valor) +
campo("58","BR") +
campo("59",nome) +
campo("60",cidade) +
campo("62",campo("05","***")) +
"6304"

let crc = crc16(payload)

let pix = payload + crc

document.getElementById("pixcode").value = pix

let qr = document.getElementById("qrcode")
qr.innerHTML=""

new QRCode(qr,{
text: pix,
width:250,
height:250
})

}

</script>

</body>
</html>
